<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Escarapela — Evaluador</title>
  <style>
    html { zoom: 3; }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, Arial, sans-serif;
      width: 430px; height: 694px;
      margin: 0; padding: 0;
      display: flex; align-items: center; justify-content: center;
      background: #fff;
    }
    .badge {
      width: 390px; height: 650px;
      border-radius: 22px; overflow: hidden; position: relative;
      box-shadow: 0 0 0 2.5px rgba(13,148,136,0.70),
                  0 0 0 5px rgba(13,148,136,0.12),
                  0 8px 40px rgba(0,0,0,0.28);
    }

    .bg { position: absolute; inset: 0; z-index: 1;
      background-image: url('../../../public/fondo-escarapela.png');
      background-size: cover; background-position: center center; }
    .overlay { position: absolute; inset: 0; z-index: 2;
      background: linear-gradient(170deg,
        rgba(10,3,28,0.50) 0%, rgba(25,7,60,0.55) 30%,
        rgba(45,14,90,0.58) 60%, rgba(12,4,38,0.66) 100%); }
    .dots { position: absolute; inset: 0; z-index: 3;
      background-image: radial-gradient(circle, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 15px 15px; }

    .holo-layer { position: absolute; inset: 0; z-index: 5;
      width: 100%; height: 100%; pointer-events: none;
      animation: holoShift 10s linear infinite; }
    @keyframes holoShift {
      0%   { filter: hue-rotate(0deg)   saturate(1.9) brightness(1.12); }
      100% { filter: hue-rotate(360deg) saturate(1.9) brightness(1.12); } }

    .ring { position: absolute; border-radius: 50%; z-index: 4; pointer-events: none; }
    .r1 { width: 300px; height: 300px; top:-118px; right:-98px; border: 1px solid rgba(20,184,166,0.20); }
    .r2 { width: 200px; height: 200px; top: -70px; right:-52px; border: 1px solid rgba(20,184,166,0.16); }
    .r3 { width: 125px; height: 125px; top: -24px; right: -7px; border: 1px solid rgba(20,184,166,0.12); }
    .r4 { width: 220px; height: 220px; bottom:100px; left:-88px; border: 1px solid rgba(20,184,166,0.08); }

    .corner { position: absolute; width: 20px; height: 20px; z-index: 15; }
    .tl { top:14px; left:14px;    border-top:2.5px solid rgba(20,184,166,0.8); border-left:2.5px solid rgba(20,184,166,0.8); }
    .tr { top:14px; right:14px;   border-top:2.5px solid rgba(20,184,166,0.8); border-right:2.5px solid rgba(20,184,166,0.8); }
    .bl { bottom:14px; left:14px;  border-bottom:2.5px solid rgba(20,184,166,0.8); border-left:2.5px solid rgba(20,184,166,0.8); }
    .br { bottom:14px; right:14px; border-bottom:2.5px solid rgba(20,184,166,0.8); border-right:2.5px solid rgba(20,184,166,0.8); }

    .content { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; }

    .header { padding: 20px 22px 18px;
      display: flex; align-items: center; justify-content: center; gap: 18px;
      background: rgba(255,255,255,0.11); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.16); }

    .logo-ucc { height: 46px;
      filter: brightness(0) invert(1) sepia(1) saturate(6) hue-rotate(0deg);
      animation: holoLogo 10s linear infinite; }
    .logo-red  { height: 66px;
      filter: brightness(0) invert(1) sepia(1) saturate(6) hue-rotate(0deg);
      animation: holoLogo 10s linear infinite; }
    @keyframes holoLogo {
      0%   { filter: brightness(0) invert(1) sepia(1) saturate(6) hue-rotate(0deg); }
      100% { filter: brightness(0) invert(1) sepia(1) saturate(6) hue-rotate(360deg); } }
    .logo-sep { width: 1px; height: 58px; background: rgba(255,255,255,0.28); flex-shrink: 0; }

    .accent-line { height: 3.5px;
      background: linear-gradient(90deg, transparent, #0d9488 18%, #5eead4 50%, #0d9488 82%, transparent); }

    .main { flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-start;
      padding: 18px 24px 10px; text-align: center; }

    .eyebrow { font-size: 7.5px; letter-spacing: 0.24em; text-transform: uppercase;
      color: rgba(255,255,255,0.75); font-weight: 700; margin-bottom: 10px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9); }
    .event-name { font-size: 15px; font-weight: 800; color: #fff;
      line-height: 1.42; margin-bottom: 8px;
      text-shadow: 0 2px 14px rgba(0,0,0,0.95); letter-spacing: 0.01em; }
    .event-date { font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(255,255,255,0.65); margin-bottom: 14px;
      text-shadow: 0 1px 6px rgba(0,0,0,0.9); }

    .sep { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; width: 100%; }
    .sep-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(20,184,166,0.65)); }
    .sep-line:last-child { background: linear-gradient(270deg, transparent, rgba(20,184,166,0.65)); }
    .sep-diamond { width: 8px; height: 8px; background: #14b8a6; transform: rotate(45deg);
      box-shadow: 0 0 12px rgba(20,184,166,0.9); }

    .field { margin-bottom: 14px; width: 100%; text-align: left; }
    .field-label { font-size: 7px; letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(255,255,255,0.68); font-weight: 700; margin-bottom: 4px;
      display: block; text-shadow: 0 1px 5px rgba(0,0,0,0.9); }
    .field-box { width: 100%; border-radius: 7px; background: rgba(255,255,255,0.93);
      border: 2px solid rgba(20,184,166,0.75); position: relative; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25), inset 0 1px 3px rgba(0,0,0,0.06); }
    .field-box.lg { height: 40px; }
    .field-box.sm { height: 32px; }
    .field-box.md { height: 36px; }
    .field-box::after { content: ''; position: absolute; left: 12px; right: 12px; height: 1px; background: rgba(0,0,0,0.11); }
    .field-box.lg::after { bottom: 10px; }
    .field-box.sm::after { bottom: 8px; }
    .field-box.md::after { bottom: 9px; }

    .role { padding: 16px 24px; text-align: center; position: relative; overflow: hidden;
      background: linear-gradient(135deg, #0f4f4a 0%, #0d6b63 22%, #0d9488 42%, #14b8a6 52%, #0d9488 72%, #0f4f4a 100%); }
    .role::before { content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(-52deg, transparent, transparent 4px, rgba(255,255,255,0.055) 4px, rgba(255,255,255,0.055) 8px); }
    .role-blob-l { position: absolute; width: 130px; height: 130px; border-radius: 50%;
      background: rgba(255,255,255,0.07); top: 50%; left: -45px; transform: translateY(-50%); }
    .role-blob-r { position: absolute; width: 110px; height: 110px; border-radius: 50%;
      background: rgba(255,255,255,0.06); top: 50%; right: -35px; transform: translateY(-50%); }
    .role-text { font-size: 24px; font-weight: 900; letter-spacing: 0.42em; text-transform: uppercase;
      color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.35); position: relative; z-index: 2; }

    .footer { padding: 7px 16px; text-align: center;
      background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
      border-top: 1px solid rgba(255,255,255,0.08); }
    .footer-text { font-size: 7px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.38); }
  </style>
</head>
